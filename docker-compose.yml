version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: biludlejning-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: biludlejning
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: biludlejning_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
